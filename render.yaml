services:
  - type: web
    name: habits-backend
    env: python
    plan: free
    buildCommand: bash bin/render-build.sh
    # Unset GUNICORN_CMD_ARGS: Render injects --bind=0.0.0.0:10000 which can clash with $PORT.
    startCommand: bash -c 'unset GUNICORN_CMD_ARGS; exec gunicorn --access-logfile - --error-logfile - --bind 0.0.0.0:"${PORT}" backend.wsgi:application'
    healthCheckPath: /health/
    envVars:
      - key: DEBUG
        value: "0"
      - key: DB_SSL_REQUIRE
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: habits-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
databases:
  - name: habits-db
    plan: free
